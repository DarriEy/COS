# COS — Community Observation Service: connector roster (honest)
#
# Non-streamflow hydrological observations only. Streamflow is CSFS's; COS never
# duplicates it. See papers/cos_design.md §5.
#
# status values (mirror CSFS):
#   implemented  — connector exists in cos/connectors/ (and is registered)
#   planned      — clear API, prioritized
#   research     — API exists but needs investigation / is registration-gated
#   manual       — no open API; requires staging
#   fallback     — community/research dataset for gap-filling
#
# structural_class: gridded | point_network | flux_tower
# auth: none | earthdata | cds | openet | ameriflux | manual

# ── IMPLEMENTED (the three proof connectors) ──────────────────────────────

- slug: grace
  name: NASA GRACE/GRACE-FO TWS
  kind: tws
  structural_class: gridded
  auth: earthdata
  status: implemented
  notes: >-
    Mascon liquid-water-equivalent grids; basin-mean / nearest-cell reduction,
    cm->mm, 2003-2008 anomaly baseline. Reduce path hermetically tested with a
    synthetic NetCDF; live fetch needs Earthdata. No native parity grade yet.

- slug: snotel
  name: NRCS SNOTEL (AWDB)
  kind: swe
  structural_class: point_network
  auth: none
  status: implemented
  notes: >-
    Anonymous AWDB report CSV; inches->mm at the connector boundary. LIVE-SMOKED.
    Native snotel.py keeps inches — parity is therefore unit-sensitive, TBD.

- slug: openet
  name: OpenET ensemble ET
  kind: et
  structural_class: flux_tower
  auth: openet
  status: implemented
  notes: >-
    Keyed ensemble ET timeseries API; mm/period->mm/day. Parse path hermetically
    tested with synthetic JSON; live fetch needs an OpenET key. No parity grade yet.

