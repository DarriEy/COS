name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # xarray/netCDF4/pandas are optional extras but installed in CI so the
        # gridded-reduction and DataFrame paths are tested and type-checked.
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Type check
        run: mypy src/cos/

      - name: Test
        # Hermetic: conftest.py blocks real network access; `-m "not network"`
        # skips tests opted into reaching a real upstream (e.g. the SNOTEL live smoke).
        run: pytest tests/ -v --tb=short -m "not network"
